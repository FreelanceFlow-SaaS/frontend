# Frontend CI/CD — Next.js app at repo root.
# Branch flow: feature/* → develop → staging → main (see README.md).
#
# Vercel — même projet pour staging + prod :
#   Secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID doivent être accessibles au job.
#   Soit secrets du dépôt (Settings → Secrets → Actions), soit dupliqués dans chaque
#   environnement GitHub utilisé ci‑dessous. Un secret défini seulement dans un env nommé
#   « global » n’est visible que si le job déclare environment: global (pas staging/prod).
#   main → --prod ; staging → Preview sur Vercel.

name: Frontend CI

on:
  pull_request:
    branches: [develop, main, staging]
  push:
    branches: [develop, staging, main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  HUSKY: "0"
  NODE_VERSION: "22"

jobs:
  quality-and-build:
    name: Install, lint, format, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Next.js build
        run: npm run build

  docker:
    name: Docker image (Story 6.1 Dockerfile)
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t frontend:ci-${{ github.sha }} -f Dockerfile .

  publish-image:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: docker
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
        run: |
          IMAGE_LOWER=$(echo "$IMAGE_BASE" | tr '[:upper:]' '[:lower:]')
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE_LOWER}:${VERSION},${IMAGE_LOWER}:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE_LOWER}:${GITHUB_SHA},${IMAGE_LOWER}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          BUILD_ARGS=""
          for TAG in "${TAGS[@]}"; do BUILD_ARGS="$BUILD_ARGS -t $TAG"; done
          docker build $BUILD_ARGS -f Dockerfile .
          for TAG in "${TAGS[@]}"; do docker push "$TAG"; done

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/tags/v'))
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            npx vercel@latest deploy --yes --token "${{ secrets.VERCEL_TOKEN }}" --prod
          else
            npx vercel@latest deploy --yes --token "${{ secrets.VERCEL_TOKEN }}"
          fi
