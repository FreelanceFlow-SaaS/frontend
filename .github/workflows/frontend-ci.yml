# Frontend CI/CD — Next.js app at repo root.
# Branch flow: feature/* → develop → staging → main (see README.md).
#
# Vercel — même projet pour staging + prod (cas par défaut) :
#   Secrets repo : VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   main → --prod (URL + variables « Production » sur Vercel)
#   staging → Preview (autre URL + variables « Preview » sur Vercel)

name: Frontend CI

on:
  pull_request:
    branches: [develop, main, staging]
  push:
    branches: [develop, staging, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  HUSKY: "0"
  NODE_VERSION: "22"

jobs:
  quality-and-build:
    name: Install, lint, format, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Next.js build
        run: npm run build

  docker:
    name: Docker image (Story 6.1 Dockerfile)
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging')
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t frontend:ci-${{ github.sha }} -f Dockerfile .

  publish-image:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: docker
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}-frontend
        run: |
          IMAGE_LOWER=$(echo "$IMAGE_BASE" | tr '[:upper:]' '[:lower:]')
          docker build -t "${IMAGE_LOWER}:${GITHUB_SHA}" -t "${IMAGE_LOWER}:latest" -f Dockerfile .
          docker push "${IMAGE_LOWER}:${GITHUB_SHA}"
          docker push "${IMAGE_LOWER}:latest"

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: quality-and-build
    if: >
      github.event_name == 'push' &&
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            npx vercel@latest deploy --yes --token "${{ secrets.VERCEL_TOKEN }}" --prod
          else
            npx vercel@latest deploy --yes --token "${{ secrets.VERCEL_TOKEN }}"
          fi
